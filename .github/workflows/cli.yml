name: CLI

on:
  pull_request:
    paths:
      - "packages/cli/**"
      - "packages/ai-integrations/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".cursor/**"
      - ".mstack/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "docs/cli/**"
      - "templates/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/cli.yml"
  push:
    branches:
      - main
    paths:
      - "packages/cli/**"
      - "packages/ai-integrations/**"
      - ".agents/**"
      - ".claude/**"
      - ".codex/**"
      - ".cursor/**"
      - ".mstack/**"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "docs/cli/**"
      - "templates/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/cli.yml"

permissions:
  contents: read

jobs:
  validate:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            node: 20
          - os: ubuntu-latest
            node: 22
          - os: ubuntu-latest
            node: 24
          - os: macos-latest
            node: 22
          - os: windows-latest
            node: 22
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - name: Verify installed AI runtime integrity
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: node packages/cli/dist/cli.js validate --strict
      - if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: |
          pnpm --filter @imisbahk/mstack docs:generate
          git diff --exit-code -- docs/cli/command-reference.md
      - run: npm pack --dry-run
        working-directory: packages/cli

  launchers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Pack CLI
        working-directory: packages/cli
        run: |
          PACKAGE_TARBALL="$(npm pack --ignore-scripts --silent)"
          echo "PACKAGE_TARBALL=$PWD/$PACKAGE_TARBALL" >> "$GITHUB_ENV"
      - run: npx --yes --package "$PACKAGE_TARBALL" mstack --version
      - run: pnpm dlx "$PACKAGE_TARBALL" --version
      - run: corepack yarn dlx --quiet "mstack@file:$PACKAGE_TARBALL" --version
      - run: bunx --package "$PACKAGE_TARBALL" mstack --version
