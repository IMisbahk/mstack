name: Documentation

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --exclude-path node_modules --exclude-path dist "**/*.md"
          fail: true
